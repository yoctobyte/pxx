# CI — runs on every push / PR. A fast, dependency-free sanity gate.
#
# Deliberately LIGHT: no FPC, no QEMU, no cross-targets. It seeds from the
# committed native stable binary (stable_linux_amd64/default/pinned) instead of
# rebuilding the compiler from FPC, self-hosts the current source to a fixedpoint
# (g2 == g3), and runs a compiled hello. Seconds, not minutes.
#
# The full release-grade gate — FPC bootstrap, full determinism, and per-target
# cross byte-identity (needs fpc + qemu-user) — lives in `release.yml`, which
# runs `make test` + `make cross-bootstrap` on a manual tag dispatch.
name: ci
on:
  push:
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: selfcheck (stable binary self-hosts current source + runs hello)
        run: make selfcheck

  # Fallback: if selfcheck failed (e.g. the committed native binary won't run on
  # the runner image), prove the tree still builds from source by minting a fresh
  # seed from FPC. Still no QEMU / no cross-targets — that depth stays in
  # release.yml. Runs ONLY on selfcheck failure, so the normal path stays fast.
  bootstrap-fallback:
    needs: selfcheck
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps (FPC seed only — no QEMU)
        run: sudo apt-get update && sudo apt-get install -y fpc
      - name: bootstrap from FPC + self-host determinism
        run: make bootstrap
      - name: core gate (tests + self-host fixedpoint)
        run: make test-core
