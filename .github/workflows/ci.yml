# CI — runs on every push / PR. Proves the tree is green & deterministic.
# Publishes NOTHING (nightly != release). A green check = "releasable".
name: ci
on:
  push:
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref, so rapid
# pushes don't pile up obsolete 5-minute runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps (FPC seed + QEMU for cross-run)
        run: sudo apt-get update && sudo apt-get install -y fpc qemu-user
      - name: bootstrap (FPC seed -> self-hosted compiler/pascal26)
        # compiler/pascal26 is a build artifact, not committed; the $(COMPILER)
        # rule refuses to auto-bootstrap, so mint the seed from FPC first.
        run: make bootstrap
      - name: gate (self-host fixedpoint + determinism)
        run: make test
      - name: cross-bootstrap (all targets byte-identical)
        run: make cross-bootstrap
