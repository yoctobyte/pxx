# Docs website — builds docs/**/*.md into a static site and deploys it to
# GitHub Pages. Generator-agnostic build step (tools/build_docs_site.py); swap
# it for anything else later without touching this workflow's plumbing.
name: pages
on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "tools/build_docs_site.py"
      - "tools/requirements-docs.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r tools/requirements-docs.txt
      - run: python3 tools/build_docs_site.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
